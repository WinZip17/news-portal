name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "."
          target: "/opt/news-portal"
          rm: false
          strip_components: 0

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            
            echo "🚀 Starting zero-downtime deployment..."
            cd /opt/news-portal
            
            # .env
            if [ ! -f .env ]; then
              echo "📝 Creating .env..."
              cat > .env << ENVEOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_DATABASE=news_portal
            DB_USERNAME=postgres
            NODE_ENV=production
            ENVEOF
            fi
            
            # Инфраструктура (если не запущена)
            docker compose up -d postgres redis prometheus grafana 2>/dev/null || true
            until docker compose exec -T postgres pg_isready -U postgres 2>/dev/null; do sleep 3; done
            echo "✅ Database ready"
            
            # Бесшовный деплой backend
            echo "🔨 Deploying backend..."
            docker compose up -d --build --scale backend=2 backend 2>/dev/null || \
            docker compose up -d --build backend
            sleep 5
            
            # Проверка backend
            if ! docker compose ps backend | grep -q "Up"; then
              echo "❌ Backend failed!"
              docker compose logs backend --tail=20
              exit 1
            fi
            echo "✅ Backend running"
            
            # Бесшовный деплой frontend
            echo "🎨 Deploying frontend..."
            docker compose up -d --build frontend
            sleep 5
            
            # Проверка frontend
            if ! docker compose ps frontend | grep -q "Up"; then
              echo "❌ Frontend failed!"
              docker compose logs frontend --tail=20
              exit 1
            fi
            echo "✅ Frontend running"
            
            # Очистка старых образов
            docker image prune -f || true
            
            echo "✅ Deployment completed!"
            docker compose ps