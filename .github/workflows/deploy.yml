name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "."
          target: "/opt/news-portal"
          rm: false
          strip_components: 0

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            
            echo "========================================"
            echo "🚀 Starting deployment..."
            echo "========================================"
            
            cd /opt/news-portal
            
            # Проверяем наличие .env файла
            if [ ! -f .env ]; then
              echo "📝 Creating .env file..."
              cat > .env << ENVEOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_DATABASE=news_portal
            DB_USERNAME=postgres
            NODE_ENV=production
            ENVEOF
            fi
            
            echo "🛑 Stopping old containers..."
            docker compose down
            
            # Запускаем инфраструктуру если не запущена
            echo "📦 Starting services..."
            docker compose up -d postgres redis prometheus grafana 2>/dev/null
            
            # Ждем готовности базы
            echo "⏳ Waiting for database..."
            until docker compose exec -T postgres pg_isready -U postgres 2>/dev/null; do
              sleep 3
            done
            echo "✅ Database is ready"
            
            # Пересобираем только при изменениях
            echo "🔨 Rebuilding backend..."
            docker compose up -d --build backend &
            BACKEND_PID=$!
            
            echo "🎨 Rebuilding frontend..."
            docker compose up -d --build frontend &
            FRONTEND_PID=$!
            
            # Ждем завершения сборок
            wait $BACKEND_PID $FRONTEND_PID
            
            # Быстрая проверка
            sleep 5
            docker compose ps
            
            echo ""
            echo "========================================"
            echo "✅ Deployment completed!"
            echo "========================================"
            docker compose ps