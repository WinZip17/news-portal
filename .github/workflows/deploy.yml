name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "."
          target: "/opt/news-portal"
          rm: false
          strip_components: 0

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "========================================"
            echo "🚀 Starting deployment..."
            echo "========================================"
            
            cd /opt/news-portal
            
            # Проверяем наличие .env файла
            if [ ! -f .env ]; then
              echo "📝 Creating .env file..."
              cat > .env << ENVEOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_DATABASE=news_portal
            DB_USERNAME=postgres
            NODE_ENV=production
            ENVEOF
            fi
            
            # Исправляем tsconfig для сборки
            echo "🔧 Fixing TypeScript configs..."
            
            # Обновляем tsconfig.json для фронтенда
            cat > frontend/tsconfig.json << TSCEOF
            {
              "compilerOptions": {
                "target": "ES2020",
                "useDefineForClassFields": true,
                "lib": ["ES2020", "DOM", "DOM.Iterable"],
                "module": "ESNext",
                "skipLibCheck": true,
                "moduleResolution": "bundler",
                "allowImportingTsExtensions": true,
                "resolveJsonModule": true,
                "isolatedModules": true,
                "noEmit": true,
                "jsx": "react-jsx",
                "strict": false,
                "noUnusedLocals": false,
                "noUnusedParameters": false,
                "noFallthroughCasesInSwitch": true,
                "ignoreDeprecations": "6.0",
                "baseUrl": ".",
                "paths": {
                  "@/*": ["src/*"]
                }
              },
              "include": ["src"]
            }
            TSCEOF
            
            # Обновляем tsconfig.node.json
            cat > frontend/tsconfig.node.json << TSCEOF
            {
              "compilerOptions": {
                "composite": true,
                "skipLibCheck": true,
                "module": "ESNext",
                "moduleResolution": "bundler",
                "allowSyntheticDefaultImports": true,
                "noEmit": false
              },
              "include": ["vite.config.ts"]
            }
            TSCEOF
            
            # Фиксим скрипт сборки в package.json
            cd frontend
            sed -i 's/"build": *"vite build"/"build": "vite build"/' package.json
            sed -i 's/"build": *"vite build"/"build": "vite build"/' package.json
            cd ..
            
            echo "✅ Configs updated"
            
            # Останавливаем старые контейнеры
            echo "🛑 Stopping old containers..."
            docker compose down || true
            
            # Очищаем кэш Docker
            echo "🧹 Cleaning Docker cache..."
            docker builder prune -a -f || true
            
            # Запускаем базу данных
            echo "🐘 Starting PostgreSQL..."
            docker compose up -d postgres
            
            # Ждем готовности базы данных
            echo "⏳ Waiting for database to be ready..."
            sleep 15
            
            # Проверяем готовность базы
            until docker compose exec -T postgres pg_isready -U postgres 2>/dev/null; do
              echo "⏳ Still waiting for database..."
              sleep 5
            done
            
            echo "✅ Database is ready"
            
            # Собираем и запускаем backend
            echo "🔨 Building and starting backend..."
            docker compose up -d --build backend
            
            # Ждем готовности backend
            sleep 10
            
            # Собираем и запускаем frontend
            echo "🎨 Building and starting frontend..."
            docker compose up -d --build frontend
            
            # Очистка старых образов
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            # Проверка статуса
            echo ""
            echo "========================================"
            echo "✅ Deployment completed!"
            echo "========================================"
            echo ""
            echo "📊 Container status:"
            docker compose ps
            
            echo ""
            echo "📋 Recent logs:"
            docker compose logs --tail=30