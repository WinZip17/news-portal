services:
  postgres:
    image: postgres:15-alpine
    container_name: news-portal-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-news_portal}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - news-portal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news-portal-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-news_portal}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3001
      OPENAI_MODEL: ${OPENAI_MODEL}
      AI_TEMPERATURE: 0.7
      AI_MAX_TOKENS: 1000
      AI_GENERATION_INTERVAL: 3600000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      news-portal-network:
        aliases:
          - backend
          - api
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news-portal-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - news-portal-network
    restart: unless-stopped

  prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
    container_name: news-portal-prometheus
    volumes:
      - prometheus_data:/prometheus
#    ports:
#      - "9090:9090"
    networks:
      - news-portal-network
    restart: unless-stopped

  grafana:
      image: grafana/grafana:latest
      container_name: news-portal-grafana
      environment:
        - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
        - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
        - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      volumes:
        - grafana_data:/var/lib/grafana
        - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
        - ./grafana/datasources:/etc/grafana/provisioning/datasources
      ports:
        - "3000:3000"
      networks:
        - news-portal-network
      restart: unless-stopped
      depends_on:
        - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  news-portal-network:
    driver: bridge