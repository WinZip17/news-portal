version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: news-portal-db
    environment:
      POSTGRES_DB: news_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - news-portal-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news-portal-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: news_portal
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    networks:
      - news-portal-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news-portal-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - news-portal-network

volumes:
  postgres_data:

networks:
  news-portal-network:
    driver: bridge