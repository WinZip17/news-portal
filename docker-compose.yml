services:
  postgres:
    image: postgres:15-alpine
    container_name: news-portal-db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-news_portal}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - news-portal-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: news-portal-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-news_portal}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3001
      OPENAI_MODEL: gpt-3.5-turbo
      AI_TEMPERATURE: 0.7
      AI_MAX_TOKENS: 1000
      AI_GENERATION_INTERVAL: 3600000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      news-portal-network:
        aliases:
          - backend
          - api
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: news-portal-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - news-portal-network
    restart: unless-stopped
  openai-proxy:
    image: ghcr.io/stulzq/azure-openai-proxy:latest
    container_name: openai-proxy
    ports:
      - "8080:8080"
    environment:
      PROXY_MODE: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - news-portal-network
volumes:
  postgres_data:

networks:
  news-portal-network:
    driver: bridge