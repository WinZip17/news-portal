  services:
    postgres:
      image: postgres:15-alpine
      container_name: news-portal-db
      environment:
        POSTGRES_DB: ${DB_DATABASE:-news_portal}
        POSTGRES_USER: ${DB_USERNAME:-postgres}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
      volumes:
        - postgres_data:/var/lib/postgresql/data
      networks:
        - news-portal-network
      restart: unless-stopped
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
        interval: 10s
        timeout: 5s
        retries: 5

    backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: news-portal-backend
      environment:
        DB_HOST: postgres
        DB_PORT: 5432
        DB_USERNAME: ${DB_USERNAME:-postgres}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_DATABASE: ${DB_DATABASE:-news_portal}
        JWT_SECRET: ${JWT_SECRET}
        JWT_EXPIRES_IN: 1d
        JWT_REFRESH_EXPIRES_IN: 7d
        NODE_ENV: production
      depends_on:
        postgres:
          condition: service_healthy
      networks:
        - news-portal-network
      restart: unless-stopped

    frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: news-portal-frontend
      ports:
        - "80:80"
      depends_on:
        - backend
      networks:
        - news-portal-network
      restart: unless-stopped

  volumes:
    postgres_data:

  networks:
    news-portal-network:
      driver: bridge
