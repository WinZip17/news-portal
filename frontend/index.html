<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>News Portal — AI-рерайт из проверенных источников | Короткие новости без манипуляций</title>
  <meta name="description" content="News Portal — быстрые и короткие новости с AI-рерайтом. Минимум слов, максимум фактов. Читайте суть за 30 секунд без кликбейта и манипуляций." />
  <meta name="keywords" content="новости, короткие новости, AI новости, рерайт новостей, факты без манипуляций, short news, новости без кликбейта" />
  <meta name="author" content="News Portal" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />

  <!-- Open Graph (для соцсетей) -->
  <meta property="og:title" content="News Portal — Короткие новости без манипуляций" />
  <meta property="og:description" content="Суть новости за 30 секунд. AI-рерайт из проверенных источников. Факты, а не эмоции." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://news-portal.ru/" />
  <meta property="og:image" content="https://news-portal.ru/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ru_RU" />
  <meta property="og:site_name" content="News Portal" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="News Portal — Короткие новости без манипуляций" />
  <meta name="twitter:description" content="Суть новости за 30 секунд. AI-рерайт из проверенных источников. Факты, а не эмоции." />
  <meta name="twitter:image" content="https://news-portal.ru/og-image.png" />

  <!-- Структурированные данные (Schema.org) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "News Portal",
      "alternateName": "Short News AI",
      "url": "https://news-portal.ru/",
      "description": "Короткие новости с AI-рерайтом из проверенных источников. Минимум слов, максимум фактов.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://news-portal.ru/news?search={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "News Portal",
        "description": "Сервис коротких новостей с AI-рерайтом"
      }
    }
  </script>

  <!-- Канонический URL -->
  <link rel="canonical" href="https://news-portal.ru/" />

  <!-- Иконки -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- Манифест -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Цвет темы -->
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="msapplication-TileColor" content="#1a1a2e" />
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
