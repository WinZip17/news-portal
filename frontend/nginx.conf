resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    server_name short-news.ru www.short-news.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name short-news.ru www.short-news.ru;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/short-news.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/short-news.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    location /api/ai/ {
        proxy_pass http://172.18.0.3:3001/api/ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /api/ {
        proxy_pass http://172.18.0.3:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /grafana/ {
        set $grafana http://news-portal-grafana:3000;
        proxy_pass $grafana;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}